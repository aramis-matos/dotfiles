# https://kubernetes.io/docs/concepts/services-networking/service/
apiVersion: v1
kind: Service
metadata:
  name: "{{ include "ttyd.frontend" (dict "root" $ "name" "startup" ) }}"
  namespace: "{{ .Release.Namespace }}"
spec:
  selector:
    {{- include "ttyd.selectorLabels" . | nindent  4 }} 
    {{- .Values.startup.selectorLabels | toYaml | nindent 4 }} 
  type: ClusterIP
  ports:
  {{- range $key, $_ := .Values.startup.ports }}
    - name: "{{ $key }}"
      port: {{ .port }}
      targetPort: {{ .port }}
      protocol: "{{ .protocol }}"
  {{- end }}
---

