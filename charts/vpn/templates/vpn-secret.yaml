# https://kubernetes.io/docs/concepts/configuration/secret/
apiVersion: v1
kind: Secret
metadata:
  name: "{{ include "vpn.secret" (dict "root" $ "name" "vpn") }}"
  namespace: "{{ .Release.Namespace }}"
type: Opaque
stringData:
  wireguard-addresses: "{{ required "WireGuard addresses not set. Please set .Values.gluetun.secrets.addresses.value" .Values.gluetun.secrets.addresses.value }}"
  wireguard-private-key: "{{ required "WireGuard private key not set. Please set .Values.gluetun.secrets.privateKey.value" .Values.gluetun.secrets.privateKey.value }}"
---

