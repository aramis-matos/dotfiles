# https://kubernetes.io/docs/concepts/services-networking/service/
apiVersion: v1
kind: Service
metadata:
  name: "{{ include "vpn.service" (dict "root" $ "name" "transmission") }}"
  namespace: "{{ .Release.Namespace }}"
spec:
  selector:
   {{- include "vpn.selectorLabels" . | nindent 4 }} 
  ports:
    {{- include "vpn.load.ports.service" (dict "root" $ "name" "transmission") | indent 4 }}
    {{- include "vpn.load.ports.service" (dict "root" $ "name" "slskd") | indent 4 }}
