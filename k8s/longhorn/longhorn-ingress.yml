# https://kubernetes.io/docs/concepts/services-networking/ingress/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-ingress
  namespace: longhorn-system
  annotations:
    nginx.org/server-snippets: |
      ssl_verify_client on;
      ssl_client_certificate /etc/nginx/secrets/longhorn-system-home-ca-key-pair;
      ssl_verify_depth 1;
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - "longhorn.minikube.home.lab"
    secretName: lab-nginx-certificate
  - hosts:
    - "longhorn.aramismatos1.com"
    secretName: nginx-certificate-secret
  - secretName: home-ca-key-pair
  rules:
  - host: "longhorn.minikube.home.lab"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: longhorn-frontend
            port:
              number: 80
  - host: "longhorn.aramismatos1.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: longhorn-frontend
            port:
              number: 80
