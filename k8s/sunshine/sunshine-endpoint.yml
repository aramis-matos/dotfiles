apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: sunshine-service
  labels:
    kubernetes.io/service-name: sunshine-service
    endpointslice.kubernetes.io/managed-by: manual-mapping
addressType: "IPv4"
endpoints:
  - addresses:
    - 192.168.1.117
    conditions:
      ready: true
ports:
  - port: 47990
    protocol: TCP
    name: sunshine-web-ui
