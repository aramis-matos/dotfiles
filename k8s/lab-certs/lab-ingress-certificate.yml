apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-nginx-ingress-certificate
spec:
  secretName: lab-nginx-certificate
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - "*.home.lab"
    - "*.minikube.home.lab"
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "default,dns,vpn,longhorn-system"
