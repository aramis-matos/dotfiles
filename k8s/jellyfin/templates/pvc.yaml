# https://kubernetes.io/docs/concepts/storage/persistent-volumes/
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "{{ .Values.volumes.config.source.persistentVolumeClaim.claimName }}"
spec:
  storageClassName: 
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# https://kubernetes.io/docs/concepts/storage/persistent-volumes/
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "{{ .Values.volumes.cache.source.persistentVolumeClaim.claimName }}"
spec:
  storageClassName: 
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 12Mi
---
