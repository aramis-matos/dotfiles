apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ttyd-ingress
  annotations:
    nginx.org/websocket-services: "ttyd-service"
    nginx.org/server-snippets: |
      ssl_verify_client on;
      ssl_client_certificate /etc/nginx/secrets/default-home-ca-key-pair;
      ssl_verify_depth 1;
    nginx.org/ssl-services: "sunshine-service"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - "moonlight.minikube.home.lab"
    - "ttyd.minikube.home.lab"
    - "startup.minikube.home.lab"
    secretName: lab-nginx-certificate
  - hosts:
    - "moonlight.aramismatos1.com"
    - "ttyd.aramismatos1.com"
    - "startup.aramismatos1.com"
    secretName: nginx-certificate-secret
  - secretName: home-ca-key-pair
  rules:
  - host: "ttyd.minikube.home.lab"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ttyd-service
            port:
              number: 7681
  - host: "ttyd.aramismatos1.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ttyd-service
            port:
              number: 7681
  - host: "moonlight.minikube.home.lab"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sunshine-service
            port:
              number: 47990
  - host: "moonlight.aramismatos1.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sunshine-service
            port:
              number: 47990
  - host: "startup.minikube.home.lab"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: startup-service
            port:
              number: 3001
  - host: "startup.aramismatos1.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: startup-service
            port:
              number: 3001
